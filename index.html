<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCT Practice Examination</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg:        #0d1117;
    --surface:   #161c26;
    --card:      #1c2535;
    --border:    #263045;
    --navy:      #0f2a4a;
    --accent:    #1e6fb5;
    --accent2:   #2491d4;
    --red:       #c0392b;
    --green:     #1e7e4a;
    --green-lit: #27ae60;
    --red-lit:   #e74c3c;
    --text:      #d0d9e8;
    --muted:     #7a8fa8;
    --label:     #5b8fbf;
    --white:     #f0f4fa;
  }

  /* ── LIGHT THEME ── */
  :root.light {
    --bg:        #eef2f7;
    --surface:   #dde5f0;
    --card:      #f4f7fb;
    --border:    #b8c8de;
    --navy:      #cddaed;
    --accent:    #1e6fb5;
    --accent2:   #1a7abf;
    --red:       #c0392b;
    --green:     #1e7e4a;
    --green-lit: #1a7a40;
    --red-lit:   #c0392b;
    --text:      #1a2535;
    --muted:     #7da6d1;
    --label:     #4e8ac5;
    --white:     #0d1a2e;
  }

  /* ── THEME TOGGLE BUTTON ── */
  #theme-toggle {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 34px;
    height: 34px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, border-color .2s;
    flex-shrink: 0;
    padding: 0;
    line-height: 1;
  }
  #theme-toggle:hover {
    background: var(--navy);
    border-color: var(--accent);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    transition: background .25s, color .25s;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0a1a2e 0%, #0f2a4a 60%, #12355e 100%);
    border-bottom: 2px solid var(--accent);
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    transition: background .25s;
  }
  :root.light header {
    background: linear-gradient(135deg, #1a3a5c 0%, #1e5599 60%, #1a6abf 100%);
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), var(--accent), var(--accent2));
  }
  .header-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 1px;
    line-height: 1.1;
  }
  header h1 span { color: var(--accent2); }
  .header-sub {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── CONTROLS BAR ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .controls label {
    font-size: 13px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Lato', sans-serif;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent2);
    color: var(--white);
  }
  .spacer { flex: 1; }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .progress-bar-outer {
    width: 140px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width .3s;
    width: 0%;
  }
  #progress-text { min-width: 60px; text-align: right; }

  /* ── SCORE SUMMARY ── */
  #score-summary {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 24px auto;
    max-width: 860px;
    padding: 28px 32px;
  }
  #score-summary h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }
  .score-card .domain-name {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 6px;
  }
  .score-card .domain-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--white);
  }
  .score-card .domain-pct {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .total-score {
    background: linear-gradient(135deg, var(--navy), #0a2040);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  :root.light .total-score {
    background: linear-gradient(135deg, #cddaed, #b8ccdf);
  }
  .total-score .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--label);
  }
  .total-score .big-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--accent2);
  }
  .total-score .pass-fail {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 4px;
  }
  .pass { background: var(--green); color: #fff; }
  .fail { background: var(--red); color: #fff; }
  #reset-btn {
    background: var(--accent);
    border: none;
    color: var(--white);
    padding: 10px 24px;
    border-radius: 4px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background .15s;
  }
  #reset-btn:hover { background: var(--accent2); }

  /* ── SECTION HEADERS ── */
  .section-header {
    max-width: 860px;
    margin: 32px auto 0;
    padding: 0 24px;
  }
  .section-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 0 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-header h2::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 20px;
    background: var(--accent);
    border-radius: 2px;
  }
  .q-count-badge {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0;
    text-transform: none;
  }

  /* ── QUESTION CARDS ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 12px 24px 48px;
  }
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 10px 0;
    overflow: hidden;
    transition: border-color .2s;
  }
  .question-card.answered-correct {
    border-color: var(--green);
  }
  .question-card.answered-wrong {
    border-color: var(--red-lit);
  }
  .question-card.hidden { display: none; }

  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px 12px;
  }
  .q-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--label);
    min-width: 30px;
    padding-top: 2px;
  }
  .q-text {
    font-size: 15px;
    color: var(--white);
    line-height: 1.5;
    flex: 1;
  }
  .q-status {
    font-size: 18px;
    min-width: 22px;
    text-align: center;
  }

  .options {
    padding: 0 18px 14px 62px;
    display: grid;
    gap: 6px;
  }
  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 4px;
    text-align: left;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all .12s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.4;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--navy);
    border-color: var(--accent);
    color: var(--white);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--label);
    min-width: 18px;
  }
  .option-btn.correct {
    background: #0e2e1c;
    border-color: var(--green-lit);
    color: #a8f0c0;
  }
  .option-btn.correct .option-letter { color: var(--green-lit); }
  .option-btn.wrong {
    background: #2c0f0f;
    border-color: var(--red-lit);
    color: #f0a8a8;
  }
  .option-btn.wrong .option-letter { color: var(--red-lit); }
  .option-btn.reveal-correct {
    background: #0e2e1c;
    border-color: var(--green-lit);
    color: #a8f0c0;
    opacity: 0.7;
  }
  .option-btn.reveal-correct .option-letter { color: var(--green-lit); }

  .feedback {
    margin: 0 18px 12px 62px;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 4px;
    display: none;
  }
  .feedback.correct {
    background: #0a2016;
    border-left: 3px solid var(--green-lit);
    color: #7de0a0;
    display: block;
  }
  .feedback.wrong {
    background: #200a0a;
    border-left: 3px solid var(--red-lit);
    color: #e08080;
    display: block;
  }

  /* light-mode overrides for hardcoded dark answer colors */
  :root.light .option-btn.correct {
    background: #d4f0e0;
    color: #0d4a24;
  }
  :root.light .option-btn.wrong {
    background: #f5d5d5;
    color: #6b1010;
  }
  :root.light .option-btn.reveal-correct {
    background: #d4f0e0;
    color: #0d4a24;
  }
  :root.light .feedback.correct {
    background: #c8eeda;
    color: #0d4a24;
  }
  :root.light .feedback.wrong {
    background: #f5d0d0;
    color: #6b1010;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .options { padding-left: 18px; }
    header h1 { font-size: 26px; }
    .controls { gap: 8px; }
    .score-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Kettering National Seminars</div>
  <h1>Certified Cardiographic Technician<br><span>Practice Examination</span></h1>
  <div class="header-sub">176 Questions · 5 Domains · Self-Scoring</div>
</header>

<div class="controls">
  <label>Filter:</label>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Anatomy">Anatomy</button>
  <button class="filter-btn" data-filter="ECG/Holter">ECG / Holter</button>
  <button class="filter-btn" data-filter="Electrophysiology">Electrophysiology</button>
  <button class="filter-btn" data-filter="Stress Testing">Stress Testing</button>
  <button class="filter-btn" data-filter="Cardiac Medications">Medications</button>
  <div class="spacer"></div>
  <button id="theme-toggle" title="Toggle light/dark mode" onclick="toggleTheme()">🌙</button>
  <span id="last-saved-label" style="display:none;font-size:12px;color:var(--muted);"></span>
  <span id="save-status" style="font-size:12px;opacity:0;transition:opacity .4s;min-width:120px;text-align:right;"></span>
  <div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
    <span id="progress-text">0 / 176</span>
  </div>
  <button id="score-btn" style="background:var(--accent);border:none;color:#fff;padding:7px 16px;border-radius:4px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;" onclick="showScore()">Score</button>
</div>

<div id="score-summary">
  <h2>Examination Results</h2>
  <div class="total-score">
    <div>
      <div class="label">Total Score</div>
      <div class="big-score" id="total-score-display">—</div>
    </div>
    <div id="pass-fail-badge"></div>
  </div>
  <div class="score-grid" id="domain-scores"></div>
  <button id="reset-btn" onclick="resetExam()">Reset Exam</button>
</div>

<main id="main-content"></main>

<script>
const QUESTIONS = [
  // ── ANATOMY (1-42) ──
  {n:1,  domain:"Anatomy", q:"What is the serous membrane that makes up the outer surface of the heart?", opts:["endocardium","epicardium","pericardium","myocardium"], ans:"B"},
  {n:2,  domain:"Anatomy", q:"Which of the following receives blood from the great veins?", opts:["left ventricle","right atria","right ventricle","left atria"], ans:"B"},
  {n:3,  domain:"Anatomy", q:"The valve between the right atria and right ventricle is called the", opts:["bicuspid","pulmonic","aortic","tricuspid"], ans:"D"},
  {n:4,  domain:"Anatomy", q:"Which of the following coronary arteries give rise to the circumflex branch?", opts:["left coronary artery","posterior interventricular artery","right coronary artery","coronary sulcus"], ans:"A"},
  {n:5,  domain:"Anatomy", q:"Which of the following is the largest and thickest heart chamber?", opts:["right atria","right ventricle","left atria","left ventricle"], ans:"D"},
  {n:6,  domain:"Anatomy", q:"The cardiac muscle tissue of the heart is called the", opts:["epicardium","pericardium","endocardium","myocardium"], ans:"D"},
  {n:7,  domain:"Anatomy", q:"Which of the following occurs when the coronary circulation becomes blocked and the cardiac muscle cells die from lack of oxygen?", opts:["ischemia","infarction","injury","reduction"], ans:"B"},
  {n:8,  domain:"Anatomy", q:"How many pulmonary veins does the left atria receive blood from?", opts:["1","2","3","4"], ans:"D"},
  {n:9,  domain:"Anatomy", q:"Which of the following is NOT a half-mooned shaped valve?", opts:["mitral","aortic","pulmonic","semilunar"], ans:"A"},
  {n:10, domain:"Anatomy", q:"What is the force exerted against the vascular walls by the blood called when the push exerted by cardiac contraction is resisted by the elasticity of the vessel walls?", opts:["heart rate","stroke volume","blood pressure","cardiac output"], ans:"C"},
  {n:11, domain:"Anatomy", q:"What is the normal oxygen saturation of the left ventricle?", opts:["25%","50%","75%","95%"], ans:"D"},
  {n:12, domain:"Anatomy", q:"Which of the following are thin wall blood vessels that permit the diffusion of gases, nutrients and wastes between the plasma and interstitial fluids?", opts:["arterioles","veins","venules","capillaries"], ans:"D"},
  {n:13, domain:"Anatomy", q:"During ventricular contraction, the prevention of backflow or regurgitation of blood back into the atrium is the function of the", opts:["chordae tendonae","semilunar valves","pulmonic valve","left ventricle"], ans:"A"},
  {n:14, domain:"Anatomy", q:"What is the formula for aortic pulse pressure?", opts:["systolic + diastolic + diastolic ÷ 3","diastolic + pulse pressure ÷ 3","pulse pressure systolic - pulse pressure diastolic","stroke volume x heart rate x 10"], ans:"C"},
  {n:15, domain:"Anatomy", q:"Which of the following receives blood from the capillaries?", opts:["veins","arteries","venules","arterioles"], ans:"C"},
  {n:16, domain:"Anatomy", q:"What is the normal pressure in the right atria?", opts:["120 mmHg","20 mmHg","12 mmHg","6 mmHg"], ans:"D"},
  {n:17, domain:"Anatomy", q:"What is the normal pulmonary artery pressure?", opts:["120/80 mmHg","25/8 mmHg","8 mmHg","2-3 mmHg"], ans:"B"},
  {n:18, domain:"Anatomy", q:"Which of the following is the amount of blood ejected by the left ventricle each minute?", opts:["mean arterial pressure","stroke volume","pulse pressure","cardiac output"], ans:"D"},
  {n:19, domain:"Anatomy", q:"The amount of force a contracting ventricle must produce to open the semilunar valve is called", opts:["pre-load","afterload","compliance","contractility"], ans:"B"},
  {n:20, domain:"Anatomy", q:"Positive inotropic agents often", opts:["block calcium entry","stimulate potassium entry","block potassium entry","stimulate calcium entry"], ans:"A"},
  {n:21, domain:"Anatomy", q:"Which of the following is NOT a source of peripheral resistance?", opts:["volume","turbulence","vascular tone","viscosity"], ans:"A"},
  {n:22, domain:"Anatomy", q:"The cardiac pacemaker or the natural pacemaker is called the", opts:["sinoatrial node","bundle of his","atrioventricular node","Purkinje fibers"], ans:"A"},
  {n:23, domain:"Anatomy", q:"Which of the following will respond to changes in oxygen levels, blood pH and cerebrospinal fluid pH?", opts:["chemoreceptors","carotid sinuses","baroreceptors","central receptors"], ans:"A"},
  {n:24, domain:"Anatomy", q:"Which of the following is in the floor of the right atrium near the opening of the coronary sinus?", opts:["sinoatrial node","bundle of his","atrioventricular node","Purkinje fibers"], ans:"C"},
  {n:25, domain:"Anatomy", q:"The resistance to blood flow primarily caused by friction within the vessel walls is called", opts:["systemic resistance","peripheral resistance","vascular resistance","pulmonary resistance"], ans:"B"},
  {n:26, domain:"Anatomy", q:"The amount of force produced during a contraction, independent of preload is called", opts:["afterload","stretch","contractility","compliance"], ans:"C"},
  {n:27, domain:"Anatomy", q:"Which of the following will generate an action potential at a rate of 40-60 per minute?", opts:["sinoatrial node","bundle of his","atrioventricular node","Purkinje fibers"], ans:"C"},
  {n:28, domain:"Anatomy", q:"Which of the following divides the right atrium from the left atrium?", opts:["interatrial septum","interventricular septum","inferior vena cava","superior vena cava"], ans:"A"},
  {n:29, domain:"Anatomy", q:"What is the normal conduction pathway of the heart?", opts:["SA node, AV node, right and left bundle branches, bundle of his, Purkinje fibers","SA node, bundle of his, AV node, right and left bundle branches, Purkinje fibers","SA node, right and left bundle branches, bundle of his, AV node, Purkinje fibers","SA node, AV node, bundle of his, right and left bundle branches, Purkinje fibers"], ans:"D"},
  {n:30, domain:"Anatomy", q:"How does blood normally flow?", opts:["arterioles, arteries, venules, capillaries, veins","arteries, arterioles, capillaries, venules, veins","veins, venules, capillaries, arteries, arterioles","arteries, veins, arterioles, venules, capillaries"], ans:"B"},
  {n:31, domain:"Anatomy", q:"Which of the following does NOT directly affect the heart?", opts:["epinephrine","growth hormones","norepinephrine","thyroid hormones"], ans:"B"},
  {n:32, domain:"Anatomy", q:"Which of the following does not carry oxygenated blood?", opts:["pulmonary vein","pulmonary artery","left ventricle","left atria"], ans:"B"},
  {n:33, domain:"Anatomy", q:"What occluded artery would most likely cause a lateral wall infarction?", opts:["circumflex","anterior descending","right coronary artery","posterior descending artery"], ans:"A"},
  {n:34, domain:"Anatomy", q:"The sympathetic and parasympathetic division of the autonomic nervous system provide intervention to the heart via the", opts:["coronary arteries","cardiac plexus","circumflex branch","coronary sinus"], ans:"B"},
  {n:35, domain:"Anatomy", q:"Where does the normal conduction system terminate in the heart?", opts:["bundle of his","Purkinje fibers","AV node","right and left bundle branches"], ans:"B"},
  {n:36, domain:"Anatomy", q:"How does blood normally flow through the heart?", opts:["left atria, left ventricle, lungs, right atria, right ventricle","right ventricle, lungs, right atria, left atria, left ventricle","right atria, right ventricle, lungs, left atria, left ventricle","left atria, lungs left ventricle, right ventricle, right atria"], ans:"C"},
  {n:37, domain:"Anatomy", q:"Which of the following is toward the body's longitudinal axis?", opts:["medial","distal","lateral","proximal"], ans:"A"},
  {n:38, domain:"Anatomy", q:"What is the function of the ventricles?", opts:["I and II only","III and IV only","II, III and IV only","I, II and IV only"], ans:"D"},
  {n:39, domain:"Anatomy", q:"The function of this structure is to collect blood returning to the heart and deliver it to the attached ventricle.", opts:["superior vena cava","inferior vena cava","atrial chambers","interatrial septum"], ans:"C"},
  {n:40, domain:"Anatomy", q:"Which of the following terms best describes at, near, or relatively close to the body surface?", opts:["distal","superficial","proximal","parietal"], ans:"B"},
  {n:41, domain:"Anatomy", q:"The cardiac centers of the ___ contain the autonomic headquarters for cardiac control.", opts:["medulla oblongata","pons","cerebellum","cerebrum"], ans:"A"},
  {n:42, domain:"Anatomy", q:"Which of the following delivers blood to the right atrium from the head, neck, upper limbs and chest?", opts:["left ventricle","interatrial septum","inferior vena cava","superior vena cava"], ans:"D"},

  // ── ECG/HOLTER (43-90, 137-165) ──
  {n:43,  domain:"ECG/Holter", q:"How would you recognize that a lead may be reversed on an ECG tracing?", opts:["lead II QRS is negative","AVR QRS is negative","lead I QRS is positive","AVF QRS is positive"], ans:"A"},

  {n:170, domain:"Cardiac Medications", q:"The first antiarrhythmic drug used for the treatment of ventricular tachycardia and fibrillation is", opts:["epinephrine","oxygen","verapamil","lidocaine"], ans:"D"},
  {n:171, domain:"Cardiac Medications", q:"A negative inotropic affect would", opts:["decrease the strength of contraction","increase the heart rate","decrease the heart rate","increase the strength of contraction"], ans:"A"},
  {n:172, domain:"Cardiac Medications", q:"Which anti-arrhythmic drug is given with an initial dose of 1mg/kg?", opts:["epinephrine","sodium bicarbonate","lidocaine","verapamil"], ans:"C"},
  {n:173, domain:"Cardiac Medications", q:"Which of the following drugs is the most common agent for arrhythmias refractory to lidocaine?", opts:["verapamil","adenosine","bretylium","procainamide"], ans:"C"},
  {n:174, domain:"Cardiac Medications", q:"These drugs can have increased effects when used with calcium channel blockers?", opts:["alpha adrenergic blockers","nitrates","direct arteriolar vasodilators","ACE inhibitors"], ans:"B"},
  {n:175, domain:"Cardiac Medications", q:"Which drug is NOT an alpha adrenergic blocker?", opts:["terazosin","prazosin","doxazosin","latensin"], ans:"D"},
  {n:176, domain:"Cardiac Medications", q:"Which of the following selectively block alpha adrenergic receptors to reduce pulmonary vascular resistance?", opts:["doxazosin","diazoxide","bretylium","benazepril"], ans:"A"},
];

const ANSWER_KEY = {};
QUESTIONS.forEach(q => { ANSWER_KEY[q.n] = q.ans; });

const DOMAINS = ["Anatomy","ECG/Holter","Electrophysiology","Stress Testing","Cardiac Medications"];
const LETTERS = ["A","B","C","D"];
const STORAGE_KEY = 'cct_exam_progress';

let answered = {};
let currentFilter = "all";
let saveTimeout = null;

// ── PERSISTENCE ──────────────────────────────────────────────
function saveProgress() {
  try {
    const payload = {
      answered,
      filter: currentFilter,
      savedAt: Date.now()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    showSaveStatus('saved');
  } catch (e) {
    showSaveStatus('error');
  }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const payload = JSON.parse(raw);
    answered = payload.answered || {};
    currentFilter = payload.filter || 'all';
    const savedAt = payload.savedAt ? new Date(payload.savedAt) : null;
    if (savedAt) {
      const ts = savedAt.toLocaleDateString('en-US', { month:'short', day:'numeric' })
               + ' at ' + savedAt.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      document.getElementById('last-saved-label').textContent = `Last saved: ${ts}`;
      document.getElementById('last-saved-label').style.display = 'inline';
    }
    return Object.keys(answered).length > 0;
  } catch (e) {
    return false;
  }
}

function clearProgress() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function showSaveStatus(state) {
  const el = document.getElementById('save-status');
  if (state === 'saved') {
    el.textContent = '✓ Saved';
    el.style.color = 'var(--green-lit)';
  } else if (state === 'saving') {
    el.textContent = '● Saving…';
    el.style.color = 'var(--muted)';
  } else {
    el.textContent = '⚠ Save failed';
    el.style.color = 'var(--red-lit)';
  }
  el.style.opacity = '1';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  showSaveStatus('saving');
  saveTimeout = setTimeout(saveProgress, 600);
}

// ── QUIZ BUILD ───────────────────────────────────────────────
function letterToIndex(l) { return LETTERS.indexOf(l); }

function buildQuiz() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  let currentDomain = null;
  QUESTIONS.forEach(q => {
    if (q.domain !== currentDomain) {
      currentDomain = q.domain;
      const qRange = QUESTIONS.filter(x => x.domain === currentDomain);
      const start = qRange[0].n;
      const end = qRange[qRange.length-1].n;
      const secDiv = document.createElement('div');
      secDiv.className = 'section-header';
      secDiv.dataset.domain = q.domain;
      secDiv.innerHTML = `<h2>${q.domain} <span class="q-count-badge">Q${start}–${end}</span></h2>`;
      main.appendChild(secDiv);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q-card-${q.n}`;
    card.dataset.domain = q.domain;

    const optsHtml = q.opts.map((opt, i) => {
      const letter = LETTERS[i];
      return `<button class="option-btn" data-q="${q.n}" data-letter="${letter}" onclick="handleAnswer(${q.n}, '${letter}')">
        <span class="option-letter">${letter}.</span><span>${opt}</span>
      </button>`;
    }).join('');

    card.innerHTML = `
      <div class="question-header">
        <div class="q-num">${q.n}.</div>
        <div class="q-text">${q.q}</div>
        <div class="q-status" id="q-status-${q.n}"></div>
      </div>
      <div class="options" id="opts-${q.n}">${optsHtml}</div>
      <div class="feedback" id="fb-${q.n}"></div>
    `;

    main.appendChild(card);

    if (answered[q.n]) restoreAnswer(q.n);
  });

  applyFilter(currentFilter);
  updateProgress();
}

function handleAnswer(qNum, letter) {
  if (answered[qNum]) return;
  answered[qNum] = letter;
  restoreAnswer(qNum);
  updateProgress();
  scheduleSave();
}

function restoreAnswer(qNum) {
  const letter = answered[qNum];
  const correct = ANSWER_KEY[qNum];
  const isCorrect = letter === correct;
  const card = document.getElementById(`q-card-${qNum}`);
  const fb = document.getElementById(`fb-${qNum}`);
  const status = document.getElementById(`q-status-${qNum}`);
  if (!card) return;

  const btns = document.querySelectorAll(`#opts-${qNum} .option-btn`);
  btns.forEach(btn => {
    btn.disabled = true;
    const btnLetter = btn.dataset.letter;
    if (btnLetter === letter && isCorrect) btn.classList.add('correct');
    else if (btnLetter === letter && !isCorrect) btn.classList.add('wrong');
    else if (btnLetter === correct && !isCorrect) btn.classList.add('reveal-correct');
  });

  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  status.textContent = isCorrect ? '✓' : '✗';

  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  const q = QUESTIONS.find(x => x.n === qNum);
  if (isCorrect) {
    fb.textContent = `Correct! The answer is ${correct}. ${q.opts[letterToIndex(correct)]}`;
  } else {
    fb.textContent = `Incorrect. The correct answer is ${correct}: ${q.opts[letterToIndex(correct)]}`;
  }
}

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  document.querySelectorAll('.question-card').forEach(card => {
    if (filter === 'all' || card.dataset.domain === filter) card.classList.remove('hidden');
    else card.classList.add('hidden');
  });
  document.querySelectorAll('.section-header').forEach(h => {
    if (filter === 'all' || h.dataset.domain === filter) h.classList.remove('hidden');
    else h.classList.add('hidden');
  });
}

function updateProgress() {
  const total = QUESTIONS.length;
  const done = Object.keys(answered).length;
  const pct = (done / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
}

function showScore() {
  const summary = document.getElementById('score-summary');
  summary.style.display = 'block';
  summary.scrollIntoView({ behavior: 'smooth' });

  let totalCorrect = 0;
  const domainStats = {};
  DOMAINS.forEach(d => domainStats[d] = { correct: 0, total: 0 });

  QUESTIONS.forEach(q => {
    domainStats[q.domain].total++;
    if (answered[q.n] === ANSWER_KEY[q.n]) {
      totalCorrect++;
      domainStats[q.domain].correct++;
    }
  });

  const pct = Math.round((totalCorrect / QUESTIONS.length) * 100);
  document.getElementById('total-score-display').textContent = `${totalCorrect} / ${QUESTIONS.length} (${pct}%)`;

  const passFail = document.getElementById('pass-fail-badge');
  passFail.className = 'pass-fail ' + (pct >= 75 ? 'pass' : 'fail');
  passFail.textContent = pct >= 75 ? 'PASSING' : 'NEEDS WORK';

  const grid = document.getElementById('domain-scores');
  grid.innerHTML = DOMAINS.map(d => {
    const s = domainStats[d];
    const dpct = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
    return `<div class="score-card">
      <div class="domain-name">${d}</div>
      <div class="domain-score">${s.correct}/${s.total}</div>
      <div class="domain-pct">${dpct}%</div>
    </div>`;
  }).join('');
}

function resetExam() {
  if (!confirm('Reset all answers and start over? This cannot be undone.')) return;
  answered = {};
  clearProgress();
  document.getElementById('score-summary').style.display = 'none';
  document.getElementById('last-saved-label').style.display = 'none';
  document.getElementById('save-status').style.opacity = '0';
  buildQuiz();
}

// ── THEME ────────────────────────────────────────────────────
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('theme-toggle').textContent = '☀️';
  } else {
    document.documentElement.classList.remove('light');
    document.getElementById('theme-toggle').textContent = '🌙';
  }
}

function toggleTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const next = isLight ? 'dark' : 'light';
  applyTheme(next);
  try { localStorage.setItem('cct_theme', next); } catch(e) {}
}

// Load saved theme preference
(function() {
  try {
    const saved = localStorage.getItem('cct_theme');
    applyTheme(saved === 'light' ? 'light' : 'dark');
  } catch(e) { applyTheme('dark'); }
})();

// ── INIT ─────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applyFilter(btn.dataset.filter);
    scheduleSave();
  });
});

// Auto-save on page unload (tab close, navigate away)
window.addEventListener('beforeunload', () => {
  if (Object.keys(answered).length > 0) saveProgress();
});

const hadProgress = loadProgress();
buildQuiz();

if (hadProgress) {
  // Brief toast so user knows their session was restored
  const el = document.getElementById('save-status');
  el.textContent = `↩ Progress restored (${Object.keys(answered).length} answers)`;
  el.style.color = 'var(--accent2)';
  el.style.opacity = '1';
  saveTimeout = setTimeout(() => { el.style.opacity = '0'; }, 4000);
}
</script>
</body>
